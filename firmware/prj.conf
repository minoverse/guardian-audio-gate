# ── Hardware watchdog ─────────────────────────────────────────────────────────
# Last-resort recovery: if the entire main thread hangs (software watchdog
# can't fire), WDT resets the SoC after 500ms.
# Two-layer design:
#   Layer 1 — software stall watchdog (75ms): restarts PDM peripheral
#   Layer 2 — hardware WDT (500ms)          : full SoC reset if layer 1 hangs
CONFIG_WATCHDOG=y
CONFIG_WDT_NRFX=y

CONFIG_PRINTK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_FPU=y
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_FILTERING=y
CONFIG_CMSIS_DSP_STATISTICS=y
CONFIG_CMSIS_DSP_TRANSFORM=y
CONFIG_CMSIS_DSP_MATRIX=y
CONFIG_CMSIS_DSP_FASTMATH=y
CONFIG_CMSIS_DSP_COMPLEXMATH=y
CONFIG_TIMING_FUNCTIONS=y
CONFIG_NRFX_PDM=y
CONFIG_NRFX_CLOCK=y
CONFIG_NRFX_NVMC=y
CONFIG_ARM_MPU=n
CONFIG_BOOTLOADER_MCUBOOT=n

# Edge Impulse C++ SDK
CONFIG_CPP=y
CONFIG_STD_CPP14=y
CONFIG_FPU_SHARING=y
CONFIG_NEWLIB_LIBC=y

# TFLite micro needs significant stack for MFCC + inference
CONFIG_MAIN_STACK_SIZE=8192

# SystemView — disabled (using printk for timing analysis instead)
CONFIG_TRACING=n
CONFIG_SEGGER_SYSTEMVIEW=n

