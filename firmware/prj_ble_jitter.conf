# ── BLE Jitter Test overlay ───────────────────────────────────────────────────
# Build with:
#   west build -s ~/projects/guardian-audio-gate/firmware \
#     -b nrf52840dk/nrf52840 -- -DEXTRA_CONF_FILE=prj_ble_jitter.conf
#
# This enables a BLE beacon (non-connectable advertiser, 100ms interval)
# running concurrently with the gate. The nRF52840 radio IRQ fires every
# 100ms and steals ~500µs from the CPU. Measures real-world gate jitter.

# BLE stack
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="GuardianGate"

# Advertiser: non-connectable, 100ms interval (worst-case radio contention)
CONFIG_BT_EXT_ADV=n

# Needs larger stack for BLE stack threads
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_BT_RX_STACK_SIZE=1024

# BLE_JITTER_TEST is a plain #define in main.c (not Kconfig) — controlled by
# whether CONFIG_BT is set. No extra line needed here.
