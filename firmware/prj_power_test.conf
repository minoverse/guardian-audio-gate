# Power measurement overlay — disable all UART/console activity so the CPU
# can actually sleep between frames and PPK2 reads reflect true idle current.
#
# Build with:
#   west build -b nrf52840dk/nrf52840 -- -DEXTRA_CONF_FILE=prj_power_test.conf
#
# Flash DMA binary  → measure baseline
# Set POLL_MODE_TEST 1, rebuild, flash → compare

# ── Kill UART (the dominant power consumer in the baseline measurement) ───────
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_STDOUT_CONSOLE=n

# ── Kill SystemView/RTT (RTT polling also prevents deep sleep) ────────────────
CONFIG_TRACING=n
CONFIG_SEGGER_SYSTEMVIEW=n
CONFIG_USE_SEGGER_RTT=n
